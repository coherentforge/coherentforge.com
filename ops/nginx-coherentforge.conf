# Reference copy — the droplet is source of truth.
# Captured: 2026-04-19.
# Location on droplet: /etc/nginx/sites-available/coherentforge.com
# Symlinked from:     /etc/nginx/sites-enabled/coherentforge.com
#
# If this file and the droplet's copy diverge, the droplet wins. Before
# editing here and deploying, confirm the current live state with:
#     ssh builder@147.182.242.59 'sudo cat /etc/nginx/sites-available/coherentforge.com'

server {
    listen 80;
    listen [::]:80;
    server_name coherentforge.com www.coherentforge.com;
    return 301 https://coherentforge.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name coherentforge.com www.coherentforge.com;

    ssl_certificate /etc/ssl/certs/coherentforge_origin.pem;
    ssl_certificate_key /etc/ssl/private/coherentforge_origin.key;

    root /var/www/coherentforge.com;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    server_tokens off;

    include /etc/nginx/snippets/nginx-hardening.conf;

    location / {
        try_files $uri $uri/ $uri/index.html =404;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
