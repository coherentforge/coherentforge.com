# Reference copy — the droplet is source of truth.
# Captured: 2026-04-19.
# Location on droplet: /etc/nginx/snippets/nginx-hardening.conf
# Included from:      /etc/nginx/sites-available/coherentforge.com
#                     (and jasonricca.com, civicduties.org — shared snippet)
#
# This snippet is shared across Jason's nginx sites. Most location blocks
# are WordPress-specific and harmless for a static Hugo site (those paths
# simply don't exist on coherentforge.com).
#
# Gotcha: `location = /readme.html { deny all; }` would 403 a Hugo page if
# content named `readme.md` is ever authored. Don't author one.

# NGINX Hardening Rules for civicduties.org jasonricca.com and optimized/inclusive for wordpress sites

# ========== TLS Cipher Suite Hardening ==========
ssl_protocols TLSv1.2 TLSv1.3;

ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';


ssl_prefer_server_ciphers on;

# ========== OCSP Stapling ==========
ssl_stapling on;
ssl_stapling_verify on;

resolver 1.1.1.1 1.0.0.1 valid=300s;
resolver_timeout 5s;

# Path to the trusted root certificate needed for OCSP stapling.
# For Cloudflare Origin Certificates, this must be the Cloudflare Origin CA root
ssl_trusted_certificate /etc/ssl/certs/cloudflare_origin_ca.pem;

# ========== Block public access to sensitive areas/info ==========
# Block access to XML-RPC endpoint
location = /xmlrpc.php {
    deny all;
    access_log off;
    log_not_found off;
}

# Block access to readme.html
location = /readme.html {
    deny all;
    access_log off;
    log_not_found off;
}

# Block access to license.txt
location = /license.txt {
    deny all;
    access_log off;
    log_not_found off;
}

# Block access to wp-links-opml.php
location = /wp-links-opml.php {
    deny all;
    access_log off;
    log_not_found off;
}
