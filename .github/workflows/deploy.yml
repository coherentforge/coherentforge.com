name: Deploy coherentforge.com

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log commit being deployed
        run: |
          echo "SHA:   ${{ github.sha }}"
          echo "Event: ${{ github.event_name }}"
          git log -1 --pretty=format:'%n  %h %s%n  %an <%ae>%n  %ad%n'
          # workflow_dispatch locks its SHA at dispatch time. If a dispatch
          # sits queued while main advances, it will run an old commit and
          # may overwrite fresher content. Warn if that's happening.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MAIN_HEAD=$(git ls-remote origin refs/heads/main | cut -f1)
            if [ "${{ github.sha }}" != "$MAIN_HEAD" ]; then
              echo "::warning::Dispatch SHA ${{ github.sha }} is behind main HEAD $MAIN_HEAD. Likely a stale dispatch — cancel and re-trigger if you want current main."
            fi
          fi

      - name: Install Hugo
        run: |
          HUGO_VERSION=0.160.1
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          hugo version

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host 147.182.242.59
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy
        run: ./deploy.sh
